# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: 2care-voice-ai-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd /opt/render/project/src && PYTHONPATH=. uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: MOCK_AI
        value: "true"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/appointments.db
      - key: LOG_LEVEL
        value: INFO
      - key: OPENAI_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
