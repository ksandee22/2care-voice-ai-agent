services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:///./data/appointments.db
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

volumes:
  redis_data:
